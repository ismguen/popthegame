<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dew Drop Pop - Reborn</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map-screen" class="overlay active">
        <h1 class="game-title">DEW DROP POP</h1>
        <p class="subtitle" style="margin-bottom: 10px;">The Journey</p>
        <div id="map-scroll-area">
            <div id="level-path-container">
                <svg id="path-lines" style="position:absolute; top:0; left:0; z-index:0; width:100%; height:100%; pointer-events:none;"></svg>
                <!-- Level nodes generated by JS -->
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px; align-items: center;">
            <button class="menu-btn" onclick="openShop()" style="font-size: 18px; padding: 10px 20px;">🛒 MAGIC SHOP</button>
            <button class="small-btn" onclick="resetProgress()">Reset Progress</button>
        </div>
    </div>

    <!-- MAGIC SHOP OVERLAY -->
    <div id="shop-screen" class="overlay">
        <h1 class="game-title" style="font-size: 60px;">MAGIC SHOP</h1>
        <p class="subtitle">Purchase Coins with real money (Fake IAP Simulation)</p>
        
        <div class="shop-container">
            <div class="shop-item" onclick="buyIAP(500, '$0.99')">
                <div class="item-icon">💰</div>
                <div class="item-name">Pouch of Coins</div>
                <div class="item-amount">500 Coins</div>
                <button class="price-btn">$0.99</button>
            </div>
            <div class="shop-item" onclick="buyIAP(1500, '$1.99')">
                <div class="item-icon">💎</div>
                <div class="item-name">Crystal Chest</div>
                <div class="item-amount">1500 Coins</div>
                <button class="price-btn">$1.99</button>
            </div>
            <div class="shop-item" onclick="buyIAP(5000, '$4.99')">
                <div class="item-icon">👑</div>
                <div class="item-name">Royal Vault</div>
                <div class="item-amount">5000 Coins</div>
                <button class="price-btn">$4.99</button>
            </div>
        </div>
        
        <div id="iap-processing" style="display:none; color: #00ffff; font-size: 20px; margin-top: 20px; text-shadow: 0 0 10px #00ffff; font-weight: bold;">
            Connecting to App Store... ⏳
        </div>
        
        <button class="small-btn" onclick="closeShop()" style="margin-top: 30px;">Back to Map</button>
    </div>

    <div id="level-complete" class="overlay">
        <h1 class="game-title" style="color: #00ff00;">LEVEL CLEARED!</h1>
        <div id="star-display" style="font-size: 60px; margin: 20px 0; text-shadow: 0 0 20px gold;">⭐ ⭐ ⭐</div>
        <p id="level-stats" style="font-size: 24px; color: #fff; margin-bottom: 30px;">Score: 0 | Drops Left: 0</p>
        <button class="menu-btn" onclick="nextLevel()" style="margin-bottom: 15px;">NEXT LEVEL</button>
        <button class="small-btn" onclick="showMap()">RETURN TO MAP</button>
    </div>

    <div id="game-over" class="overlay">
        <h1 class="game-over-title">OUT OF MAGIC</h1>
        <p id="final-score" style="font-size: 30px; color: #00ffff; font-weight: bold;">Score: 0</p>
        <button class="menu-btn" onclick="restartLevel()">TRY AGAIN</button>
        <button class="small-btn" style="margin-top: 20px;" onclick="showMenu()">MAIN MENU</button>
    </div>

    <div id="game-wrapper">
        <div id="top-banner">
            <div id="banner-level-container">
                <span id="level-display-num">1</span>
            </div>
            <div id="banner-center">
                <div id="star-progress-bar">
                    <div id="star-fill"></div>
                    <div class="star-marker" id="star-1" style="left: 33%;">★</div>
                    <div class="star-marker" id="star-2" style="left: 66%;">★</div>
                    <div class="star-marker" id="star-3" style="left: 100%;">★</div>
                </div>
                <div id="drops-display" class="banner-pill">
                    <span class="icon">💧</span> <span id="drops-text">10</span>
                </div>
            </div>
            <div id="banner-right">
                <div id="coins-display">🪙 0</div>
            </div>
        </div>
        
        <div id="canvas-container">
            <canvas id="gameCanvas" width="720" height="720"></canvas>
        </div>

        <div id="skills-bar-container">
            <div id="skills-bar">
                <button class="skill-btn round-btn" id="btn-hammer" onclick="activateSkill('hammer')" title="Hammer (50c)">🔨<span class="cost">50</span></button>
                <button class="skill-btn round-btn" id="btn-sunbeam" onclick="activateSkill('sunbeam')" title="Sunbeam (100c)">☀️<span class="cost">100</span></button>
                <button class="skill-btn round-btn" id="btn-rain" onclick="activateSkill('rain')" title="Rain (150c)">💧<span class="cost">150</span></button>
                <button class="skill-btn round-btn" id="btn-roots" onclick="activateSkill('roots')" title="Overcharge (200c)">🌱<span class="cost">200</span></button>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
